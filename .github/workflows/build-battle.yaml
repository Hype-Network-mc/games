name: "Build and deploy Battle"

on:
  push:
    branches: [main]
    paths:
      - 'gamesdk/**'
      - 'core/**'
      - '.github/workflows/build-battle.yaml'
      - 'battle/**'
      - 'build.gradle.kts'

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "emortalmc/actions/java/build@main"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          project: "battle"
          gradle-command: "gradle battle:build --no-daemon"
          dockerfile-path: './battle/Dockerfile'
          dockerfile-context: './battle/'

  deploy:
    needs: "build"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "emortalmc/actions/argo-sync@main"
        with:
          deployment-name: "battle"
          values-path: "server/values/battle.yaml"
          deployments-repo-token: "${{ secrets.DEPLOYMENTS_REPO_TOKEN }}"
