name: "Build and deploy ParkourTag"

on:
  push:
    branches: [main]
    paths:
      - 'gamesdk/**'
      - 'core/**'
      - '.github/workflows/build-parkourtag.yaml'
      - 'parkourtag/**'
      - 'build.gradle.kts'

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "emortalmc/actions/java/build@main"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          project: "parkourtag"
          gradle-command: "gradle parkourtag:build --no-daemon"
          dockerfile-path: './parkourtag/Dockerfile'
          dockerfile-context: './parkourtag/'

  deploy:
    needs: "build"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "emortalmc/actions/argo-sync@main"
        with:
          deployment-name: "parkourtag"
          values-path: "server/values/parkourtag.yaml"
          deployments-repo-token: "${{ secrets.DEPLOYMENTS_REPO_TOKEN }}"
